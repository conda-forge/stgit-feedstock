context:
  version: "2.6.0"

package:
  name: stgit
  version: ${{ version }}

source:
  url: https://github.com/stacked-git/stgit/archive/v${{ version }}.tar.gz
  sha256: 117d31d8766e3139125cad18a9257594e8f32756a849ebb0a2e2daa312773c96

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
    - make
    - pkg-config
  host:
    - curl
    - git
    - libcurl
    - openssl
    - zlib
  run:
    - git

tests:
  - script:
      - stg --help

about:
  license: GPL-2.0-only
  license_file:
    - COPYING
    - THIRDPARTY.yml
  summary: Manage Git commits as a stack of patches
  homepage: https://stacked-git.github.io
  repository: https://github.com/stacked-git/stgit

extra:
  recipe-maintainers:
    - danielnachun
