context:
  version: "2.5.5"

package:
  name: stgit
  version: ${{ version }}

source:
  url: https://github.com/stacked-git/stgit/archive/v${{ version }}.tar.gz
  sha256: de9ff92975f047a255cfe1dc8e0470c33e70fb9d8f1ec622205920735eea30ce

build:
  number: 1

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
    - make
    - pkg-config
  host:
    - curl
    - git
    - libcurl
    - openssl
    - zlib
  run:
    - git

tests:
  - script:
      - stg --help

about:
  license: GPL-2.0-only
  license_file:
    - COPYING
    - THIRDPARTY.yml
  summary: Manage Git commits as a stack of patches
  homepage: https://stacked-git.github.io
  repository: https://github.com/stacked-git/stgit

extra:
  recipe-maintainers:
    - danielnachun
